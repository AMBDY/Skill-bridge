<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category — SkillBridge</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav id="navbar"></nav>
<main class="container" style="padding:32px 24px">
  <div id="catHead"></div>
  <div class="ad-slot" style="margin:24px 0">Advertisement</div>
  <div class="section-head">
    <div><span class="eyebrow">Filters</span><h2 style="font-size:1.4rem">Refine results</h2></div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px" id="filters">
    <select class="form-select" id="filterSort" style="max-width:180px">
      <option value="recommended">Recommended</option>
      <option value="rating">Highest rated</option>
      <option value="price_low">Lowest price</option>
      <option value="price_high">Highest price</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem"><input type="checkbox" id="filterVerified"> Verified only</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem"><input type="checkbox" id="filterOnline"> Online now</label>
  </div>
  <div class="grid grid-4" id="listings"></div>
</main>
<footer id="footer"></footer>
<script src="/js/app.js"></script>
<script src="/js/category.js"></script>
</body>
</html>
