<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — SkillBridge</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav id="navbar"></nav>
<main class="container" style="padding:32px 24px">
  <h1 class="section-title">My Payments</h1>
  <p class="section-sub">Escrow transactions and payment history.</p>
  <div id="payList" style="margin-top:24px"></div>
</main>
<footer id="footer"></footer>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.isLoggedIn()) { location.href = '/signin.html'; return; }
  const user = Auth.user();
  const list = document.getElementById('payList');
  list.innerHTML = '<div class="skeleton" style="height:120px"></div>';
  const payments = await API.get('/payments').catch(() => []);
  list.innerHTML = payments.length ? payments.map(p => `
    <div class="card" style="margin-bottom:12px"><div class="card-body" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><div style="font-weight:500">${p.job?.title || 'Payment'}</div>
      <div class="card-meta"><span>${fmtPrice(p.amount)}</span><span>•</span><span>Fee: ${fmtPrice(p.service_fee)}</span><span>•</span><span>${p.payment_method}</span><span>•</span><span>${p.status}</span></div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">${timeAgo(p.created_at)}</div></div>
      ${p.status === 'in_escrow' && p.client_id === user.user_id ? `<button class="btn btn-gold btn-sm" onclick="markReceived('${p.id}')">Mark Received</button>` : ''}
    </div></div>`).join('') : '<p style="color:var(--text-muted)">No payments yet.</p>';
});
window.markReceived = async function (id) {
  try { await API.put(`/payments/${id}/received`); Toast.show('Marked received! Admin will release funds.'); setTimeout(() => location.reload(), 1000); }
  catch (e) { Toast.show(e.message); }
};
</script>
</body>
</html>
