<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — SkillBridge</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav id="navbar"></nav>

<main class="container" style="padding:32px 24px">
  <h1 class="section-title" id="searchTitle">Search</h1>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin:24px 0">
    <input class="form-input" id="searchInput" placeholder="Search services, products, jobs, categories..." style="flex:1;min-width:240px">

    <select class="form-select" id="searchType" style="max-width:180px">
      <option value="all">All</option>
      <option value="services">Services</option>
      <option value="products">Products</option>
      <option value="jobs">Jobs</option>
      <option value="categories">Categories</option>
    </select>

    <button class="btn btn-gold" id="searchBtn">Search</button>
  </div>

  <div id="results"></div>
</main>

<footer id="footer"></footer>

<script src="/js/sb-config.js"></script>
<script src="/js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const q = params.get('q') || '';

  document.getElementById('searchInput').value = q;
  document.getElementById('searchTitle').textContent = q ? `Results for "${q}"` : 'Search';

  document.getElementById('searchBtn').addEventListener('click', doSearch);

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });

  if (q) doSearch();

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    const type = document.getElementById('searchType').value;
    const el = document.getElementById('results');

    if (!query) {
      Toast.show('Enter something to search');
      return;
    }

    el.innerHTML = '<div class="skeleton" style="height:120px;margin-bottom:12px"></div><div class="skeleton" style="height:120px"></div>';

    const result = await API.get(`/marketplace/search?q=${encodeURIComponent(query)}`).catch((err) => {
      Toast.show(err.message);
      return { categories: [], products: [], services: [], jobs: [] };
    });

    const categories = result.categories || [];
    const products = result.products || [];
    const services = result.services || [];
    const jobs = result.jobs || [];

    let html = '';

    if ((type === 'all' || type === 'categories') && categories.length) {
      html += `
        <h2 style="font-size:1.4rem;margin:24px 0 12px">Categories</h2>
        <div class="grid grid-4" style="margin-bottom:24px">
          ${categories.map(c => `
            <a href="/category.html?ecosystem=${c.ecosystem}&slug=${c.slug}" class="cat-tile">
              <span class="cat-icon">📂</span>
              <span class="cat-name">${c.name}</span>
            </a>
          `).join('')}
        </div>
      `;
    }

    if ((type === 'all' || type === 'products') && products.length) {
      html += `
        <h2 style="font-size:1.4rem;margin:24px 0 12px">Products</h2>
        <div class="grid grid-4" style="margin-bottom:24px">
          ${products.map(item => productCard(item)).join('')}
        </div>
      `;
    }

    if ((type === 'all' || type === 'services') && services.length) {
      html += `
        <h2 style="font-size:1.4rem;margin:24px 0 12px">Services</h2>
        <div class="grid grid-4" style="margin-bottom:24px">
          ${services.map(item => serviceCard(item)).join('')}
        </div>
      `;
    }

    if ((type === 'all' || type === 'jobs') && jobs.length) {
      html += `
        <h2 style="font-size:1.4rem;margin:24px 0 12px">Jobs</h2>
        <div style="margin-bottom:24px">
          ${jobs.map(job => jobCard(job)).join('')}
        </div>
      `;
    }

    if (!html) {
      html = '<p style="color:var(--text-muted);text-align:center;padding:48px">No results found.</p>';
    }

    el.innerHTML = html;
  }

  function productCard(item) {
    const img = (item.images && item.images[0]) || 'https://images.pexels.com/photos/3184405/pexels-photo-3184405.jpeg';

    return `
      <div class="card">
        <div class="card-img">
          <img src="${img}" alt="${item.title || 'Product'}">
        </div>

        <div class="card-body">
          <div class="card-title">${item.title || 'Product'}</div>
          <div class="card-meta">${item.categories?.name || 'Product'}</div>
          <div class="card-price">${fmtPrice(item.price || 0)}</div>
          <a href="/listing.html?type=product&id=${item.id}" class="btn btn-outline btn-sm">View</a>
        </div>
      </div>
    `;
  }

  function serviceCard(item) {
    const img = (item.images && item.images[0]) || 'https://images.pexels.com/photos/3184405/pexels-photo-3184405.jpeg';

    return `
      <div class="card">
        <div class="card-img">
          <img src="${img}" alt="${item.title || 'Service'}">
        </div>

        <div class="card-body">
          <div class="card-title">${item.title || 'Service'}</div>
          <div class="card-meta">${item.categories?.name || 'Service'}</div>
          <div class="card-price">${fmtPrice(item.price || 0)}</div>
          <a href="/listing.html?type=service&id=${item.id}" class="btn btn-outline btn-sm">View</a>
        </div>
      </div>
    `;
  }

  function jobCard(job) {
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-body" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div class="card-title">
              <a href="/job.html?id=${job.id}">${job.title || 'Job'}</a>
            </div>

            <div class="card-meta">
              <span>${job.categories?.name || 'Job'}</span>
              <span>|</span>
              <span>${job.job_type || 'remote'}</span>
              <span>|</span>
              <span>${job.location || job.state || 'Nigeria'}</span>
            </div>
          </div>

          <div style="text-align:right">
            <div class="card-price">${fmtPrice(job.budget || job.price_max || 0)}</div>
            <a href="/job.html?id=${job.id}" class="btn btn-gold btn-sm" style="margin-top:8px">View Job</a>
          </div>
        </div>
      </div>
    `;
  }
});
</script>
</body>
</html>
