<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Products — SkillBridge</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav id="navbar"></nav>
<main class="container" style="padding:32px 24px">
  <span class="eyebrow">Shop Products</span>
  <h1 class="section-title">Shop Authentic African Products</h1>
  <p class="section-sub">From clothes and shoes to gadgets, cars, and land — buy from verified sellers with escrow protection on every order.</p>

  <div class="ad-slot" style="margin:24px 0">Advertisement</div>

  <div class="grid grid-5" id="catGrid" style="margin:32px 0"></div>

  <div class="section-head" style="margin-top:32px">
    <div><span class="eyebrow">Featured Products</span><h2 class="section-title" style="font-size:1.8rem">Top Products</h2></div>
    <select class="form-select" id="sortSel" style="max-width:200px">
      <option value="recommended">Recommended</option>
      <option value="rating">Highest rated</option>
      <option value="price_low">Lowest price</option>
      <option value="price_high">Highest price</option>
    </select>
  </div>
  <div class="grid grid-4" id="listings"></div>
</main>
<footer id="footer"></footer>
<script src="/js/sb-config.js"></script>
<script src="/js/app.js"></script>
<script src="/js/marketplace.js"></script>
<script>Marketplace.init('shop');</script>
</body>
</html>
