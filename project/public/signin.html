<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SkillBridge</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav id="navbar"></nav>
<div class="auth-wrap">
  <div class="auth-card" style="max-width:440px">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your SkillBridge account.</p>
    <form id="signinForm">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" name="email" required></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" name="password" required></div>
      <button type="submit" class="btn btn-gold btn-block btn-lg" id="signinBtn">Sign In</button>
      <p style="text-align:center;margin-top:16px"><a href="#" style="color:var(--gold);font-size:0.9rem">Forgot password?</a></p>
      <p style="text-align:center;margin-top:12px;color:var(--text-soft)">New here? <a href="/signup.html" style="color:var(--gold)">Create account</a></p>
    </form>
  </div>
</div>
<footer id="footer"></footer>
<script src="/js/sb-config.js"></script>
<script src="/js/app.js"></script>
<script src="/js/signin.js"></script>
</body>
</html>
